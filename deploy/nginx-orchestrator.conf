server {
    listen 8443 ssl http2;
    server_name orchestrator.tuodominio.com;

    # Certificato Let's Encrypt (generato con: certbot certonly --nginx -d orchestrator.tuodominio.com)
    ssl_certificate     /etc/letsencrypt/live/orchestrator.tuodominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orchestrator.tuodominio.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root  /home/orchestrator/wp-orchestrator/public;
    index index.php;

    # Filament assets (CSS/JS compilati)
    location /build {
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm-orchestrator.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout generosi per operazioni lunghe (provisioning via AJAX)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # Log separati per l'orchestrator
    access_log /var/log/nginx/orchestrator.access.log;
    error_log  /var/log/nginx/orchestrator.error.log;
}
