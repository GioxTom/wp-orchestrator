; Pool PHP-FPM dedicato per WP Orchestrator
; File: /etc/php/8.3/fpm/pool.d/orchestrator.conf

[orchestrator]
user  = orchestrator
group = www-data

; Socket dedicato — non condiviso con i siti WordPress
listen = /run/php/php8.3-fpm-orchestrator.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Process manager dinamico
pm                   = dynamic
pm.max_children      = 15
pm.start_servers     = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Timeout per le operazioni lunghe (provisioning)
request_terminate_timeout = 300

; Restrizioni PHP
php_admin_value[disable_functions]  = ""
php_admin_value[open_basedir]       = /home/orchestrator/wp-orchestrator:/tmp:/var/www
php_admin_flag[display_errors]      = off
php_admin_value[error_log]          = /home/orchestrator/wp-orchestrator/storage/logs/php-fpm.log
php_admin_flag[log_errors]          = on
php_admin_value[memory_limit]       = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[upload_max_filesize]= 64M
php_admin_value[post_max_size]      = 64M

; Slow log
slowlog           = /home/orchestrator/wp-orchestrator/storage/logs/php-slow.log
request_slowlog_timeout = 10s
