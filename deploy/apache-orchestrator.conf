Listen 8083

<VirtualHost *:8083>
    ServerName orchestrator.cloud007.info

    DocumentRoot /usr/local/wp-orchestrator/public

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/orchestrator.cloud007.info/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/orchestrator.cloud007.info/privkey.pem

    <Directory /usr/local/wp-orchestrator/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM via socket dedicato
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm-orchestrator.sock|fcgi://localhost"
    </FilesMatch>

    # Timeout per operazioni lunghe (provisioning)
    TimeOut 300
    ProxyTimeout 300

    # Log separati
    ErrorLog  /usr/local/wp-orchestrator/storage/logs/apache-error.log
    CustomLog /usr/local/wp-orchestrator/storage/logs/apache-access.log combined
</VirtualHost>